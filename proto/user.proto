syntax = "proto3";

package user;

service UserService {
  rpc GetUserById (UserIdRequest) returns (UserResponse);
  rpc ValidateUser (UserIdRequest) returns (ValidateUserResponse);
  rpc UpdateUserPoint (UpdatePointRequest) returns (UserResponse);
}

message UserIdRequest {
  int32 id = 1;
}

message UpdatePointRequest {
  int32 id = 1;
  int32 points = 2;
}

message UserResponse {
  int32 id = 1;
  string username = 2;
  string role = 3;
  int32 points = 4;
}

message ValidateUserResponse {
  bool valid = 1;
  int32 id = 2;
  string username = 3;
  string role = 4;
  int32 points = 5;
}
